<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Chandan & Preety</title>
    <link rel="stylesheet" href="style.css?v=1.5">
    <link
        href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <style>
        .celebration-container {
            max-width: 600px;
            margin: 100px auto;
            text-align: center;
            padding: 60px 20px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid #F2D5D0;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
        }

        .thank-you-name {
            font-family: 'Pinyon Script', cursive;
            font-size: 4.5rem;
            color: var(--gold);
            margin-bottom: 10px;
            line-height: 1.1;
        }

        .message-box {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: var(--dark-text);
            margin: 20px 0 40px;
            line-height: 1.6;
        }

        .ornament {
            color: var(--rose-accent);
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .back-home {
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.8rem;
            color: var(--deep-rose);
            text-decoration: none;
            border-bottom: 1px solid var(--rose-accent);
            padding-bottom: 5px;
            transition: 0.3s;
        }

        .back-home:hover {
            color: var(--dark-text);
            border-color: var(--dark-text);
        }

        @media (max-width: 600px) {
            .thank-you-name {
                font-size: 3rem;
            }

            .celebration-container {
                margin: 50px 20px;
            }
        }
    </style>
</head>

<body>

    <div class="celebration-container">
        <div class="ornament">✿</div>

        <h1 id="thankYouHeader" class="thank-you-name">Thank You!</h1>

        <div class="message-box">
            <p id="personalMsg">Your RSVP has been successfully received. We are truly honored to have you join us as we
                begin our beautiful journey together.</p>
        </div>

        <div class="ornament" style="margin-top: 0;">❦</div>

        <p style="margin-top: 30px;">
            <a href="index.html" class="back-home">Return to Invitation</a>
        </p>
    </div>

    <script>
        // 1. Grab the URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const guestName = urlParams.get('guest');

        // Debugging: This will show in your browser console (F12)
        console.log("Captured Name:", guestName);

        if (guestName && guestName.trim() !== "") {
            const cleanName = decodeURIComponent(guestName);

            // Update Header
            document.getElementById('thankYouHeader').innerText = "Thank You, " + cleanName + "!";

            // Update Sub-message
            document.getElementById('personalMsg').innerHTML =
                "We have received your response, <strong>" + cleanName + "</strong>. <br>" +
                "We are so excited to celebrate our special day with you!";
        }
    </script>
</body>

</html>

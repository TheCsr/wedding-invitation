<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chandan & Preety's Wedding</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <section class="hero-split">
        <div class="hero-image">
            <img src="wedding-couple.png" alt="Chandan and Preety">
        </div>
        <div class="hero-text">
            <h1>Chandan & Preety</h1>
            <p class="couple-names">Save the Date</p>
            <a href="#rsvp-section" class="btn-gold">RSVP Now</a>
        </div>
    </section>

    <div class="main-content">
        <h2 class="section-title">The Wedding Events</h2>
        
        <div class="event-grid">
            <div class="card">
                <h3>Haldi & Mehendi</h3>
                <p class="date">April 28 | Baisakh 15</p>
                <p class="venue">At Our Own Residence</p>
            </div>

            <div class="card highlighted">
                <h3>The Wedding</h3>
                <p class="date">April 30 | Baisakh 17</p>
                <p class="venue">Hotel Sita Palace, Sarlahi</p>
            </div>

            <div class="card">
                <h3>Reception</h3>
                <p class="date">May 02 | Baisakh 19</p>
                <p class="venue">Vishuwa Hotel, Birgunj</p>
            </div>
        </div>

        <section id="rsvp-section" class="rsvp-container">
            <h2>Are you coming?</h2>
            <form id="weddingForm">
                <div class="form-row">
                    <input type="text" name="name" placeholder="Your Full Name" required>
                    <input type="email" name="email" placeholder="Your Email" required>
                </div>
                
                <div class="form-row selection">
                    <div class="select-group">
                        <label>Attending Wedding?</label>
                        <select name="wedding" required>
                            <option value="yes">Yes, I'll be there!</option>
                            <option value="no">Sadly, I can't</option>
                        </select>
                    </div>
                    <div class="select-group">
                        <label>Joining Barat?</label>
                        <select name="barat">
                            <option value="yes">Yes, with joy!</option>
                            <option value="no">No</option>
                        </select>
                    </div>
                </div>
                
                <button type="submit" class="submit-btn">Submit RSVP</button>
            </form>
        </section>
    </div>

    <footer>
        <p>Celebrating Chandan & Preety • 2026</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
